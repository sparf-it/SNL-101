<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{title}</title>
    
    <style>
        /* Define your custom look here */

        .login-container {
            background: rgba(255, 255, 255, 0);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #fff; }
        p { color: #aaa; font-size: 0.9rem; margin-bottom: 1.5rem; }
        
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            border-radius: 6px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background-color: #6366f1; /* Custom Primary Color */
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #4f46e5; }
        .remember-me {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            color: #ccc;
        }
        .remember-me input { margin-right: 0.5rem; }
        
        /* This is crucial for displaying errors */
        #label-error {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: block;
        }
		.page-header {
			  border-bottom: 1px solid var(--glass-border);
			  padding: 4rem 1.5rem 3rem;
			  text-align: center;
			}
			.page-header h1 {
			color: #000000;
			  font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
			  font-size: clamp(2rem, 5vw, 3.2rem);
			  font-weight: 800;
			  -webkit-background-clip: text;
			  background-clip: text;
			  margin-bottom: 0.75rem;
			}
			footer {
				background: #e9edf1;
				border-top: 1px solid rgba(0, 0, 0, 0.08);
				padding: 0.75rem 1.5rem;
				text-align: center;
				color: #4a4a4a;
				font-size: 0.75rem;
			  }
    </style>
</head>
<body>
	  <div class="page-header">
	    <img src="https://sparf.nl/images/SparfLogo_Transparent.png" class="logo" alt="Logo">
		<h1>Vertrouwd werken met AI: veilig en compliant</h1>
		<h2>SNL-101</h2>
	  </div>
	<div class="login-container">
		<form id="staticrypt-form" action="javascript:void(0);">
			<input type="password" name="password" id="password" placeholder="Enter Password" autofocus>
			
			<div class="remember-me">
				<input type="checkbox" id="remember-me">
				<label for="remember-me">Remember me</label>
			</div>
			
			<button type="submit" id="staticrypt-submit">Unlock</button>
		</form>

		<span id="label-error"></span>
	</div>

{js_inject}

  <footer>
    &copy; <span id="year"></span> Sparf IT. Alle rechten voorbehouden.
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
